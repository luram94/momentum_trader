# HQM Momentum Scanner Configuration
# =====================================
# Every key in this file is read by the application. UI filter defaults come
# from scanner_filters; the filters themselves are opt-in per scan.

# Portfolio Settings
portfolio:
  default_size: 10000          # Default portfolio size in USD
  default_positions: 8         # Default number of positions (7-10 recommended)
  min_size: 1000              # Minimum portfolio size accepted by the UI
  max_positions: 50           # Maximum positions accepted by the UI

# Data Collection Settings
data:
  exchanges:
    - NYSE
    - NASDAQ
  min_market_cap: '+Mid (over $2bln)'  # FinViz filter string
  cache_expiry_hours: 24      # Data counts as fresh below this age (stale below 2x)

# HQM Strategy Settings
strategy:
  min_percentile_threshold: 25  # Minimum percentile in ANY timeframe (scanner AND backtest)

# Scanner Filter Defaults (initial UI values; each filter is opt-in)
scanner_filters:
  max_sma10_distance: 15      # Default 'Max SMA10 Distance' (%)
  min_rsi: 0                  # Default 'Min RSI'
  max_rsi: 70                 # Default 'Max RSI'
  min_avg_volume: 500000      # Default 'Min Avg Volume'
  max_atr_percent: 10         # Default 'Max ATR' (% of price)
  max_per_sector: 3           # Default 'Max per Sector' (diversification)

# Risk Metrics
risk:
  benchmark: SPY              # Benchmark for beta calculation
  risk_free_rate: 0.05        # Annual risk-free rate (5%)
  sharpe_period_days: 252     # Trading periods per year for annualization

# Backtesting Settings
backtest:
  default_period_days: 90     # Default backtest period
  initial_capital: 10000
  rebalance_frequency: weekly # daily, weekly, monthly
  slippage_percent: 0.1       # 0.1% slippage per trade
  commission_per_trade: 0     # Commission per trade in USD

# Logging Settings
logging:
  level: INFO                 # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: 'logs/hqm_scanner.log'
  max_size_mb: 10
  backup_count: 3
  console_output: true

# API Rate Limiting
rate_limits:
  yfinance_batch_size: 50     # Batch size for yfinance downloads

# Database Settings
database:
  path: 'data/hqm_data.db'
