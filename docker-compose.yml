services:
  hqm-scanner:
    build: .
    container_name: hqm-momentum-scanner
    ports:
      - "5000:5000"
    volumes:
      # Persist database
      - hqm-data:/app/data
      # Mount config for customization (optional)
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/data-status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Development mode with hot reload
  hqm-scanner-dev:
    build: .
    container_name: hqm-momentum-scanner-dev
    ports:
      - "5001:5000"
    volumes:
      - .:/app
      - hqm-data-dev:/app/data
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    command: ["python", "app.py"]
    profiles:
      - dev

volumes:
  hqm-data:
    driver: local
  hqm-data-dev:
    driver: local
